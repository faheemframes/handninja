<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hand Ninja 🍉</title>
<style>
  html, body {
    margin: 0; padding: 0; width: 100%; height: 100%;
    background: #000; overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }

  /* Canvas fills the screen and is CSS-mirrored (selfie view). All
     drawing (video, fruits, blade trail) happens in NORMAL (unmirrored)
     coordinates — the CSS flip mirrors the whole finished picture at
     once, so nothing needs manual mirror math. */
  #outputCanvas {
    position: absolute; top: 0; left: 0;
    width: 100vw; height: 100vh;
    transform: scaleX(-1);
    background: #000;
  }

  #sourceVideo {
    position: absolute; width: 1px; height: 1px; opacity: 0; pointer-events: none;
  }

  /* IMPORTANT: all UI text lives in normal (non-mirrored) DOM elements,
     NOT drawn on the canvas — text drawn on the mirrored canvas would
     come out backwards/unreadable. */
  #ui {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none; z-index: 10;
    display: flex; flex-direction: column; align-items: center;
  }

  #hud {
    width: 100%;
    display: flex; justify-content: space-between; align-items: flex-start;
    padding: 16px 24px; box-sizing: border-box;
  }

  #scoreWrap { display: flex; flex-direction: column; gap: 4px; }

  #score {
    color: #fff; font-size: 28px; font-weight: 800;
    text-shadow: 0 2px 8px rgba(0,0,0,0.6);
  }

  #combo {
    color: #7dffe0; font-size: 16px; font-weight: 700;
    font-family: "Courier New", monospace; letter-spacing: 1px;
    text-shadow: 0 0 10px rgba(125,255,224,0.8);
    opacity: 0; transition: opacity 0.15s ease-out;
  }
  #combo.show { opacity: 1; }

  #lives { font-size: 24px; text-shadow: 0 2px 8px rgba(0,0,0,0.6); }

  #brandMark {
    position: absolute;
    bottom: 14px; right: 18px;
    color: rgba(255,255,255,0.55);
    font-family: "Courier New", monospace;
    font-size: 13px;
    letter-spacing: 3px;
    text-shadow: 0 0 8px rgba(125,220,255,0.5);
  }

  #status {
    background: rgba(0,0,0,0.55); color: #fff;
    padding: 8px 14px; border-radius: 8px; font-size: 13px;
    margin-top: 8px;
  }

  #gameOverPanel {
    display: none;
    background: rgba(0,0,0,0.75);
    color: #fff;
    padding: 28px 36px;
    border-radius: 16px;
    text-align: center;
    margin-top: 20vh;
    pointer-events: auto;
  }
  #gameOverPanel h1 { margin: 0 0 8px; font-size: 32px; }
  #gameOverPanel p { margin: 4px 0 18px; font-size: 18px; opacity: 0.85; }
  #restartBtn {
    background: #fff; border: none; padding: 12px 22px;
    border-radius: 8px; font-size: 15px; font-weight: 700; cursor: pointer;
  }

  /* Shared overlay used both for the initial "Start" screen and for
     mid-game "Paused" — same look, different text, kept simple. */
  #overlayPanel {
    display: flex;
    background: rgba(0,0,0,0.75);
    color: #fff;
    padding: 28px 36px;
    border-radius: 16px;
    text-align: center;
    margin-top: 20vh;
    pointer-events: auto;
    flex-direction: column;
    align-items: center;
  }
  #overlayPanel h1 { margin: 0 0 8px; font-size: 30px; }
  #overlayPanel p { margin: 4px 0 18px; font-size: 15px; opacity: 0.85; max-width: 320px; }
  #overlayBtn {
    background: #fff; border: none; padding: 12px 26px;
    border-radius: 8px; font-size: 16px; font-weight: 700; cursor: pointer;
  }

  #pauseBtn {
    pointer-events: auto;
    background: rgba(0,0,0,0.55); color: #fff; border: none;
    width: 40px; height: 40px; border-radius: 50%;
    font-size: 16px; cursor: pointer;
  }

  /* Red damage flash when a bomb gets sliced */
  #flash {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    background: red; opacity: 0; pointer-events: none; z-index: 9;
  }

  /* Colored tint that stays on screen for the duration of an active
     power-up (blue=freeze, orange=frenzy, gold=double score) */
  #tint {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    opacity: 0; pointer-events: none; z-index: 8;
    transition: opacity 0.3s ease;
  }

  /* Big center-top announcement when a special banana is sliced */
  #banner {
    position: absolute; top: 18%; left: 50%;
    transform: translate(-50%, -10px);
    color: #fff; font-size: 34px; font-weight: 900;
    letter-spacing: 2px;
    text-shadow: 0 0 20px currentColor, 0 2px 8px rgba(0,0,0,0.7);
    opacity: 0; pointer-events: none; z-index: 11;
    transition: opacity 0.25s ease, transform 0.25s ease;
  }
  #banner.show { opacity: 1; transform: translate(-50%, 0); }
</style>
</head>
<body>

  <video id="sourceVideo" autoplay playsinline muted></video>
  <canvas id="outputCanvas"></canvas>
  <div id="flash"></div>
  <div id="tint"></div>
  <div id="banner"></div>

  <div id="ui">
    <div id="hud">
      <div id="scoreWrap">
        <div id="score">Score: 0</div>
        <div id="combo">COMBO</div>
      </div>
      <button id="pauseBtn">⏸</button>
      <div id="lives">❤️❤️❤️</div>
    </div>
    <div id="status">Loading hand tracking model…</div>
    <div id="overlayPanel">
      <h1 id="overlayTitle">Loading…</h1>
      <p id="overlayText">Getting the camera and hand tracking ready.</p>
      <button id="overlayBtn">▶ Start</button>
    </div>
    <div id="gameOverPanel">
      <h1>Game Over</h1>
      <p id="finalScore"></p>
      <button id="restartBtn">Play again</button>
    </div>
  </div>
  <div id="brandMark">QUBITSORG</div>

<script type="module">
  import {
    HandLandmarker,
    FilesetResolver
  } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/vision_bundle.mjs";

  // ============================================================
  //  DOM REFERENCES
  // ============================================================
  const video      = document.getElementById("sourceVideo");
  const canvas     = document.getElementById("outputCanvas");
  const ctx        = canvas.getContext("2d");
  const statusEl   = document.getElementById("status");
  const scoreEl    = document.getElementById("score");
  const comboEl    = document.getElementById("combo");
  const livesEl    = document.getElementById("lives");
  const flashEl    = document.getElementById("flash");
  const tintEl     = document.getElementById("tint");
  const bannerEl   = document.getElementById("banner");
  const gameOverEl = document.getElementById("gameOverPanel");
  const finalScoreEl = document.getElementById("finalScore");
  const restartBtn = document.getElementById("restartBtn");
  const overlayEl   = document.getElementById("overlayPanel");
  const overlayTitle = document.getElementById("overlayTitle");
  const overlayText  = document.getElementById("overlayText");
  const overlayBtn   = document.getElementById("overlayBtn");
  const pauseBtn     = document.getElementById("pauseBtn");

  // Naming the actual emoji fonts (instead of a generic family like
  // "serif") avoids the browser silently swapping fonts on first draw
  // — that swap is what looked like fruit "fading in" from low opacity.
  const EMOJI_FONT = `"Apple Color Emoji","Segoe UI Emoji","Noto Color Emoji",sans-serif`;

  // ============================================================
  //  SFX — synthesized on the fly with the Web Audio API. No audio
  //  files to load, no music, just short procedural sounds.
  // ============================================================
  const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

  function unlockAudio() {
    if (audioCtx.state === "suspended") audioCtx.resume();
  }

  // Quick descending "swoosh" — a fruit slice.
  function playSliceSfx() {
    unlockAudio();
    const t = audioCtx.currentTime;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = "sawtooth";
    osc.frequency.setValueAtTime(950 + Math.random() * 250, t);
    osc.frequency.exponentialRampToValueAtTime(140, t + 0.12);
    gain.gain.setValueAtTime(0.16, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.14);
    osc.connect(gain).connect(audioCtx.destination);
    osc.start(t); osc.stop(t + 0.15);
  }

  // Short filtered noise burst — a bomb going off.
  function playBombSfx() {
    unlockAudio();
    const t = audioCtx.currentTime;
    const len = audioCtx.sampleRate * 0.3;
    const buffer = audioCtx.createBuffer(1, len, audioCtx.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < len; i++) data[i] = (Math.random() * 2 - 1) * (1 - i / len);
    const noise = audioCtx.createBufferSource();
    noise.buffer = buffer;
    const filter = audioCtx.createBiquadFilter();
    filter.type = "lowpass";
    filter.frequency.setValueAtTime(700, t);
    const gain = audioCtx.createGain();
    gain.gain.setValueAtTime(0.45, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
    noise.connect(filter).connect(gain).connect(audioCtx.destination);
    noise.start(t);
  }

  // Two-note bright chime — a special banana pickup.
  function playSpecialSfx() {
    unlockAudio();
    const t = audioCtx.currentTime;
    [[660, 0], [990, 0.08]].forEach(([freq, delay]) => {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = "sine";
      osc.frequency.setValueAtTime(freq, t + delay);
      gain.gain.setValueAtTime(0.14, t + delay);
      gain.gain.exponentialRampToValueAtTime(0.001, t + delay + 0.15);
      osc.connect(gain).connect(audioCtx.destination);
      osc.start(t + delay); osc.stop(t + delay + 0.16);
    });
  }

  // ============================================================
  //  Fix for fruit "fading in"/lagging on first appearance: the
  //  browser doesn't rasterize an emoji glyph until it's drawn for
  //  the first time, which can cause a blank/partial frame right
  //  when a new fruit type first appears mid-game. Drawing every
  //  emoji once (off-screen, invisibly) at startup forces that work
  //  to happen upfront instead of during gameplay.
  // ============================================================
  function warmUpEmojiGlyphs() {
    const warm = document.createElement("canvas");
    warm.width = 200; warm.height = 200;
    const wctx = warm.getContext("2d");
    // Warm up at several sizes spanning the real in-game fruit radii
    // (56–83px radius → ~112–166px font), not just one small size —
    // browsers can cache glyphs per exact pixel size.
    for (const size of [110, 130, 150, 170]) {
      wctx.font = `${size}px ${EMOJI_FONT}`;
      for (const e of [...FRUIT_EMOJIS, BOMB_EMOJI, "🍌", "🍅"]) {
        wctx.fillText(e, 20, 100);
      }
    }
  }

  // ============================================================
  //  GAME CONSTANTS
  // ============================================================
  const GRAVITY = 1400;              // px/s^2 — shared by fruits, pieces, digit particles
  const FRUIT_EMOJIS = ["🍎", "🍊", "🍉", "🍇", "🍓", "🥝", "🍑", "🍒", "🥭", "🍍"]; // no plain 🍌 — that's reserved for real specials now
  const BOMB_EMOJI = "💣";
  const BOMB_CHANCE = 0.15;          // 15% of spawned objects are bombs
  const MIN_SWIPE_SPEED = 500;       // px/sec — lowered so partial/blurred swipes still count
  const HIT_RADIUS_MULT = 1.35;      // extra forgiveness on top of the fruit's drawn size
  const HAND_LOST_GRACE_MS = 250;    // how long to keep the trail alive through a tracking blip
  const START_LIVES = 3;
  const COMBO_WINDOW_MS = 700;       // slice again within this window to keep the combo alive

  // ============================================================
  //  GAME STATE
  // ============================================================
  let fallingObjects = [];  // whole, uncut fruits/bombs currently in the air
  let pieces = [];          // sliced fruit halves flying apart
  let digitParticles = [];  // little binary-digit burst at the cut seam
  let explosionParticles = []; // bomb debris
  let slashFlashes = [];    // brief bright streak drawn across the exact cut line
  let handTrails = [[], []]; // recent fingertip positions per hand slot, for blade trail + slicing
  let score = 0;
  let lives = START_LIVES;
  let gameOver = false;
  let paused = true;   // starts paused — nothing spawns/moves until Start is pressed
  let started = false; // becomes true after the first Start press
  let nextSpawnAt = 0;
  let lastFrameTime = performance.now();
  let comboCount = 0;
  let lastSliceTime = 0;
  let frenzyUntil = 0; // performance.now() timestamp until which Frenzy is active
  let freezeUntil = 0; // ...until which fruit motion is slowed
  let doubleUntil = 0; // ...until which score gains are doubled

  let handLandmarker = null;
  let lastVideoTime = -1;
  const INDEX_TIP = 8; // MediaPipe landmark: index fingertip

  // ============================================================
  //  STEP 1 — Camera
  // ============================================================
  async function startCamera() {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { width: 1280, height: 720, facingMode: "user" },
      audio: false
    });
    video.srcObject = stream;
    await new Promise((resolve) => {
      video.onloadedmetadata = () => { video.play(); resolve(); };
    });
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
  }

  // ============================================================
  //  STEP 2 — MediaPipe HandLandmarker (up to 2 hands = 2 blades)
  // ============================================================
  async function setupHandLandmarker() {
    const vision = await FilesetResolver.forVisionTasks(
      "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm"
    );
    handLandmarker = await HandLandmarker.createFromOptions(vision, {
      baseOptions: {
        modelAssetPath:
          "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task",
        delegate: "GPU"
      },
      runningMode: "VIDEO",
      numHands: 2,
      minHandDetectionConfidence: 0.4,
      minHandPresenceConfidence: 0.4,
      minTrackingConfidence: 0.4
    });
  }

  // ============================================================
  //  Spawning fruits/bombs/specials
  // ============================================================
  const SPECIAL_CHANCE = 0.13; // chance a spawn is a special banana instead of plain fruit
  const GOLDEN_CHANCE  = 0.05; // chance a spawn is the golden multi-hit fruit
  const SPECIAL_TYPES = ["frenzy", "freeze", "double"];
  const SPECIAL_COLORS = {
    frenzy: "255,150,60",
    freeze: "110,200,255",
    double: "255,215,80"
  };

  function spawnWave() {
    const w = canvas.width, h = canvas.height;
    const inFrenzy = performance.now() < frenzyUntil;
    // Frenzy Banana's whole point: swarm the screen with extra fruit —
    // real Fruit Ninja keeps bomb risk low during Frenzy too, otherwise
    // more spawns per second just means more bombs per second.
    const count = inFrenzy ? 2 + Math.floor(Math.random() * 2) : (Math.random() < 0.25 ? 2 : 1);
    const bombChance = inFrenzy ? 0.04 : BOMB_CHANCE;

    for (let i = 0; i < count; i++) {
      const roll = Math.random();
      let kind = "fruit";
      if (roll < bombChance) kind = "bomb";
      else if (roll < bombChance + SPECIAL_CHANCE) kind = "special";
      else if (roll < bombChance + SPECIAL_CHANCE + GOLDEN_CHANCE) kind = "golden";

      const peakHeight = h * (0.4 + Math.random() * 0.4); // how high it flies
      const vy = -Math.sqrt(2 * GRAVITY * peakHeight);     // launch speed needed to reach that peak
      const x = w * (0.2 + Math.random() * 0.6);
      const vx = (Math.random() - 0.5) * 220;

      const obj = {
        x, y: h + 40, vx, vy,
        radius: 56 + Math.random() * 16,
        rotation: 0,
        vrot: (Math.random() - 0.5) * 2,
        wobbleSeed: Math.random() * 1000,
        sliced: false,
        isBomb: false, isSpecial: false, isGolden: false
      };

      if (kind === "bomb") {
        obj.emoji = BOMB_EMOJI;
        obj.isBomb = true;
      } else if (kind === "special") {
        obj.emoji = "🍌";
        obj.isSpecial = true;
        obj.specialType = SPECIAL_TYPES[Math.floor(Math.random() * SPECIAL_TYPES.length)];
      } else if (kind === "golden") {
        obj.emoji = "🍅"; // stand-in for the classic multi-hit pomegranate — no real pomegranate emoji exists
        obj.isGolden = true;
        obj.hitsRemaining = 3;
        obj.hitsTotal = 3;
        obj.radius *= 1.15; // a bit bigger — it's the prize target
      } else {
        obj.emoji = FRUIT_EMOJIS[Math.floor(Math.random() * FRUIT_EMOJIS.length)];
      }

      fallingObjects.push(obj);
    }
  }

  // ============================================================
  //  Slicing a fruit into two physical halves
  //  (Renders the emoji once to an offscreen canvas, then clips two
  //  halves along the cut angle so each half keeps its shape while
  //  tumbling independently afterward.)
  // ============================================================
  function makeHalfSprites(emoji, radius, cutAngle) {
    const size = radius * 2.4;
    const src = document.createElement("canvas");
    src.width = size; src.height = size;
    const sctx = src.getContext("2d");
    sctx.font = `${radius * 2}px ${EMOJI_FONT}`;
    sctx.textAlign = "center";
    sctx.textBaseline = "middle";
    sctx.fillText(emoji, size / 2, size / 2);

    function buildHalf(topSide) {
      const half = document.createElement("canvas");
      half.width = size; half.height = size;
      const hctx = half.getContext("2d");
      hctx.save();
      hctx.translate(size / 2, size / 2);
      hctx.rotate(cutAngle);
      hctx.translate(-size / 2, -size / 2);
      hctx.beginPath();
      if (topSide) hctx.rect(0, 0, size, size / 2);
      else hctx.rect(0, size / 2, size, size / 2);
      hctx.clip();
      hctx.setTransform(1, 0, 0, 1, 0, 0); // draw the source unrotated; only the clip is rotated
      hctx.drawImage(src, 0, 0);
      hctx.restore();
      return half;
    }

    return { imgA: buildHalf(true), imgB: buildHalf(false), size };
  }

  // Cut `obj` along the direction of the finger swipe (`angle`).
  function sliceFruit(obj, angle) {
    obj.sliced = true;
    playSliceSfx();
    const { imgA, imgB, size } = makeHalfSprites(obj.emoji, obj.radius, angle);
    const perpX = Math.cos(angle + Math.PI / 2);
    const perpY = Math.sin(angle + Math.PI / 2);
    const kick = 160;

    [[imgA, 1], [imgB, -1]].forEach(([img, side]) => {
      pieces.push({
        img, size,
        x: obj.x, y: obj.y,
        vx: obj.vx + perpX * kick * side,
        vy: obj.vy + perpY * kick * side - 80,
        rotation: obj.rotation,
        vrot: obj.vrot + side * 3,
        life: 1
      });
    });

    // ---- Binary-digit "dissolve" along the cut seam only ----
    // Not the whole fruit — just a scattering of 0/1 particles born
    // right along the slice line, drifting off and fading.
    const digitCount = 10 + Math.floor(Math.random() * 6);
    for (let i = 0; i < digitCount; i++) {
      const t = (Math.random() - 0.5) * obj.radius * 1.6; // position along the cut line
      const px = obj.x + Math.cos(angle) * t;
      const py = obj.y + Math.sin(angle) * t;
      digitParticles.push({
        x: px, y: py,
        vx: perpX * (60 + Math.random() * 120) * (Math.random() < 0.5 ? 1 : -1),
        vy: perpY * (60 + Math.random() * 120) * (Math.random() < 0.5 ? 1 : -1) - 40,
        text: Math.random() < 0.5 ? "0" : "1",
        size: 12 + Math.random() * 10,
        life: 1
      });
    }

    // ---- Combo tracking: slicing again within COMBO_WINDOW_MS keeps
    // the chain alive and scales the bonus; a pause resets it. ----
    const now = performance.now();
    if (now - lastSliceTime <= COMBO_WINDOW_MS) comboCount++;
    else comboCount = 1;
    lastSliceTime = now;

    const rawBonus = 10 + (comboCount - 1) * 5; // combo x1=10, x2=15, x3=20...
    const doubled = now < doubleUntil;
    const bonus = doubled ? rawBonus * 2 : rawBonus;
    score += bonus;
    scoreEl.textContent = `Score: ${score}`;

    if (comboCount > 1 || doubled) {
      comboEl.textContent = doubled
        ? `COMBO x${comboCount}  +${bonus} (2x!)`
        : `COMBO x${comboCount}  +${bonus}`;
      comboEl.classList.add("show");
    }

    // ---- Bright slash-flash streak right along the cut, for impact ----
    slashFlashes.push({ x: obj.x, y: obj.y, angle, size: obj.radius * 2.6, life: 1 });
  }

  // ============================================================
  //  Special banana pickup — activates a timed power-up and shows
  //  a banner. Frenzy = more fruit spawns; Freeze = fruit motion
  //  slows way down (your swipe speed is unaffected, so it's much
  //  easier to chain slices); Double = score gains ×2 for a bit.
  // ============================================================
  function activateSpecial(obj) {
    const now = performance.now();
    if (obj.specialType === "frenzy") frenzyUntil = now + 3000;
    else if (obj.specialType === "freeze") freezeUntil = now + 3000;
    else if (obj.specialType === "double") doubleUntil = now + 4000;

    const gain = (now < doubleUntil && obj.specialType !== "double") ? 40 : 20;
    score += gain;
    scoreEl.textContent = `Score: ${score}`;

    showBanner(obj.specialType);
    slashFlashes.push({ x: obj.x, y: obj.y, angle: 0, size: obj.radius * 2.6, life: 1 });
  }

  function showBanner(type) {
    const labels = { frenzy: "🍌 FRENZY!", freeze: "🍌 FREEZE!", double: "🍌 DOUBLE SCORE!" };
    const colors = { frenzy: "rgb(255,150,60)", freeze: "rgb(110,200,255)", double: "rgb(255,215,80)" };
    bannerEl.textContent = labels[type];
    bannerEl.style.color = colors[type];
    bannerEl.classList.add("show");
    clearTimeout(showBanner._t);
    showBanner._t = setTimeout(() => bannerEl.classList.remove("show"), 1300);

    tintEl.style.background = colors[type].replace("rgb", "rgba").replace(")", ",0.12)");
    tintEl.style.opacity = "1";
  }

  // ============================================================
  //  Golden fruit — needs several hits before it actually splits.
  //  Each hit scores on its own; the final hit triggers a full
  //  sliceFruit() for the halves + digit-dissolve payoff.
  // ============================================================
  function hitGolden(obj, angle) {
    obj.hitsRemaining--;
    playSliceSfx();
    const now = performance.now();
    const gain = (now < doubleUntil) ? 30 : 15;
    score += gain;
    scoreEl.textContent = `Score: ${score}`;
    slashFlashes.push({ x: obj.x, y: obj.y, angle, size: obj.radius * 2, life: 1 });

    if (obj.hitsRemaining <= 0) {
      sliceFruit(obj, angle); // final hit: full split + digit dissolve + combo scoring
    }
  }

  function explodeBomb(obj) {
    playBombSfx();
    for (let i = 0; i < 22; i++) {
      const a = Math.random() * Math.PI * 2;
      const speed = 200 + Math.random() * 300;
      explosionParticles.push({
        x: obj.x, y: obj.y,
        vx: Math.cos(a) * speed, vy: Math.sin(a) * speed,
        radius: 4 + Math.random() * 6,
        life: 1,
        color: Math.random() < 0.5 ? "255,120,40" : "255,60,30"
      });
    }
    flashEl.style.transition = "none";
    flashEl.style.opacity = "0.55";
    requestAnimationFrame(() => {
      flashEl.style.transition = "opacity 0.4s ease-out";
      flashEl.style.opacity = "0";
    });

    lives--;
    renderLives();
    if (lives <= 0) endGame();
  }

  function renderLives() {
    livesEl.textContent = "❤️".repeat(Math.max(0, lives)) + "🖤".repeat(START_LIVES - Math.max(0, lives));
  }

  function endGame() {
    gameOver = true;
    finalScoreEl.textContent = `Final score: ${score}`;
    gameOverEl.style.display = "block";
  }

  function resetGame() {
    fallingObjects = []; pieces = []; digitParticles = []; explosionParticles = []; slashFlashes = [];
    score = 0; lives = START_LIVES; gameOver = false; comboCount = 0; lastSliceTime = 0;
    frenzyUntil = 0; freezeUntil = 0; doubleUntil = 0;
    nextSpawnAt = performance.now() + 500;
    scoreEl.textContent = "Score: 0";
    comboEl.classList.remove("show");
    bannerEl.classList.remove("show");
    tintEl.style.opacity = "0";
    renderLives();
    gameOverEl.style.display = "none";
    paused = false; // "Play again" should just go straight back into play
    pauseBtn.textContent = "⏸";
  }

  // ============================================================
  //  Start / Pause — same overlay panel reused for both so this
  //  stays simple: one panel, one button, text changes with state.
  // ============================================================
  function showOverlay(title, text, buttonLabel) {
    overlayTitle.textContent = title;
    overlayText.textContent = text;
    overlayBtn.textContent = buttonLabel;
    overlayEl.style.display = "flex";
  }
  function hideOverlay() { overlayEl.style.display = "none"; }

  function togglePause() {
    if (gameOver || !started) return; // pause button only matters mid-game
    paused = !paused;
    if (paused) {
      pauseBtn.textContent = "▶";
      showOverlay("Paused", "Camera and tracking stay on — just no spawning or scoring.", "▶ Resume");
    } else {
      pauseBtn.textContent = "⏸";
      hideOverlay();
    }
  }
  pauseBtn.addEventListener("click", togglePause);

  overlayBtn.addEventListener("click", () => {
    if (!started) {
      // First-ever Start press.
      started = true;
      paused = false;
      nextSpawnAt = performance.now() + 500;
      hideOverlay();
    } else {
      // Resuming from a mid-game pause.
      paused = false;
      pauseBtn.textContent = "⏸";
      hideOverlay();
    }
  });
  restartBtn.addEventListener("click", resetGame);

  // ============================================================
  //  Point-to-segment distance — used to check if the finger's
  //  swipe path this frame passed close enough to a fruit to cut it.
  // ============================================================
  function distToSegment(px, py, ax, ay, bx, by) {
    const dx = bx - ax, dy = by - ay;
    const lenSq = dx * dx + dy * dy;
    let t = lenSq === 0 ? 0 : ((px - ax) * dx + (py - ay) * dy) / lenSq;
    t = Math.max(0, Math.min(1, t));
    const cx = ax + t * dx, cy = ay + t * dy;
    return Math.hypot(px - cx, py - cy);
  }

  // ============================================================
  //  Per-frame hand tracking: update fingertip trails, run slice
  //  detection against every un-cut fruit/bomb.
  // ============================================================
  function processHands(results, w, h) {
    const hands = results?.landmarks || [];

    for (let slot = 0; slot < 2; slot++) {
      const landmarks = hands[slot];
      const trail = handTrails[slot];

      if (!landmarks) {
        // Tracking blipped for this frame — this is exactly what
        // tends to happen mid-swipe (motion blur lowers detection
        // confidence). Instead of wiping the trail (which would
        // erase the very swipe we're trying to catch), just leave it
        // alone for a short grace window so the NEXT good detection
        // can still connect back to it as one continuous movement.
        if (trail.length && performance.now() - trail[trail.length - 1].t > HAND_LOST_GRACE_MS) {
          handTrails[slot] = []; // truly gone for a while now — reset for real
        }
        continue;
      }

      const tip = { x: landmarks[INDEX_TIP].x * w, y: landmarks[INDEX_TIP].y * h, t: performance.now() };
      const prev = trail[trail.length - 1];
      trail.push(tip);
      if (trail.length > 8) trail.shift();

      if (prev) {
        const dt = Math.max(1, tip.t - prev.t) / 1000;
        const speed = Math.hypot(tip.x - prev.x, tip.y - prev.y) / dt;

        if (speed > MIN_SWIPE_SPEED) {
          const angle = Math.atan2(tip.y - prev.y, tip.x - prev.x);
          for (const obj of fallingObjects) {
            if (obj.sliced) continue;
            const d = distToSegment(obj.x, obj.y, prev.x, prev.y, tip.x, tip.y);
            if (d <= obj.radius * HIT_RADIUS_MULT) {
              if (obj.isBomb) {
                explodeBomb(obj);
                obj.sliced = true;
              } else if (obj.isSpecial) {
                activateSpecial(obj);
                obj.sliced = true;
              } else if (obj.isGolden) {
                hitGolden(obj, angle); // sets obj.sliced itself only on the final hit
              } else {
                sliceFruit(obj, angle);
                obj.sliced = true;
              }
            }
          }
        }
      }
    }
    // Drop sliced objects out of the "whole" list immediately.
    fallingObjects = fallingObjects.filter(o => !o.sliced);
  }

  // ============================================================
  //  Drawing helpers
  // ============================================================
  // ============================================================
  //  BLADE TRAIL — layered for a "techy energy blade" feel:
  //  1) a wide soft outer glow
  //  2) a crisp bright white core (reads as an actual sharp edge)
  //  3) small perpendicular tick marks along the path, like a
  //     scanning/digital readout riding the blade
  // ============================================================
  function drawBladeTrails() {
    ctx.save();
    for (const trail of handTrails) {
      for (let i = 1; i < trail.length; i++) {
        const a = trail[i - 1], b = trail[i];
        const alpha = i / trail.length;

        // 1) outer glow — soft, cyan, wide
        ctx.strokeStyle = `rgba(90, 220, 255, ${alpha * 0.5})`;
        ctx.lineWidth = 10 + alpha * 10;
        ctx.shadowColor = "rgba(90,220,255,0.9)";
        ctx.shadowBlur = 20;
        ctx.beginPath();
        ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y);
        ctx.stroke();

        // 2) bright core — thin, near-white, the "sharp edge" of the cut
        ctx.strokeStyle = `rgba(235, 255, 255, ${alpha})`;
        ctx.lineWidth = 2 + alpha * 2;
        ctx.shadowBlur = 6;
        ctx.beginPath();
        ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y);
        ctx.stroke();

        // 3) small perpendicular tick — digital/techy accent riding the blade
        const angle = Math.atan2(b.y - a.y, b.x - a.x);
        const tickLen = 6 + alpha * 6;
        const px = Math.cos(angle + Math.PI / 2), py = Math.sin(angle + Math.PI / 2);
        ctx.strokeStyle = `rgba(140, 255, 210, ${alpha * 0.7})`;
        ctx.lineWidth = 1.5;
        ctx.shadowBlur = 4;
        ctx.beginPath();
        ctx.moveTo(b.x - px * tickLen, b.y - py * tickLen);
        ctx.lineTo(b.x + px * tickLen, b.y + py * tickLen);
        ctx.stroke();
      }
    }
    ctx.restore();
  }

  // Bright expanding streak drawn exactly along the cut line the
  // instant a fruit is sliced — this is what sells "impact" (the
  // blade trail alone doesn't stamp the moment of contact).
  function drawSlashFlashes() {
    ctx.save();
    ctx.globalCompositeOperation = "lighter";
    for (const s of slashFlashes) {
      const len = s.size * (1 + (1 - s.life) * 0.4);
      const dx = Math.cos(s.angle) * len / 2, dy = Math.sin(s.angle) * len / 2;
      const grad = ctx.createLinearGradient(s.x - dx, s.y - dy, s.x + dx, s.y + dy);
      grad.addColorStop(0,   `rgba(150,240,255,0)`);
      grad.addColorStop(0.5, `rgba(255,255,255,${s.life})`);
      grad.addColorStop(1,   `rgba(150,240,255,0)`);
      ctx.strokeStyle = grad;
      ctx.lineWidth = 5 * s.life;
      ctx.beginPath();
      ctx.moveTo(s.x - dx, s.y - dy);
      ctx.lineTo(s.x + dx, s.y + dy);
      ctx.stroke();
    }
    ctx.restore();
  }

  // Fruit gets a subtle "alive" pulse (scale) and micro-wobble on top
  // of its physics rotation, so it doesn't read as a static sticker.
  function drawFallingObjects() {
    const t = performance.now() * 0.001;
    for (const obj of fallingObjects) {
      const pulse = 1 + Math.sin(t * 5 + obj.wobbleSeed) * 0.06;
      const wobble = Math.sin(t * 3 + obj.wobbleSeed) * 0.08;

      // Special bananas / golden fruit get a colored glow ring behind
      // them so they read as "different" at a glance mid-air.
      if (obj.isSpecial || obj.isGolden) {
        const color = obj.isSpecial ? SPECIAL_COLORS[obj.specialType] : "255,200,60";
        const glowPulse = 1 + Math.sin(t * 8 + obj.wobbleSeed) * 0.15;
        ctx.save();
        const grad = ctx.createRadialGradient(obj.x, obj.y, 0, obj.x, obj.y, obj.radius * 1.4 * glowPulse);
        grad.addColorStop(0, `rgba(${color},0.55)`);
        grad.addColorStop(1, `rgba(${color},0)`);
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(obj.x, obj.y, obj.radius * 1.4 * glowPulse, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }

      ctx.save();
      ctx.translate(obj.x, obj.y);
      ctx.rotate(obj.rotation + wobble);
      ctx.scale(pulse, pulse);
      ctx.font = `${obj.radius * 2}px ${EMOJI_FONT}`;
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText(obj.emoji, 0, 0);
      ctx.restore();

      // Golden fruit: small pips above it showing hits remaining.
      // (Wrapped in save/restore — leaving fillStyle set afterward
      // was bleeding a low-alpha color into every emoji drawn after
      // it, which is what made fruit look faded until they got cut.)
      if (obj.isGolden) {
        ctx.save();
        const pipY = obj.y - obj.radius * 1.5;
        const spacing = 14;
        const startX = obj.x - spacing * (obj.hitsTotal - 1) / 2;
        for (let i = 0; i < obj.hitsTotal; i++) {
          ctx.beginPath();
          ctx.arc(startX + i * spacing, pipY, 5, 0, Math.PI * 2);
          ctx.fillStyle = i < obj.hitsRemaining ? "rgb(255,210,60)" : "rgba(255,255,255,0.25)";
          ctx.fill();
        }
        ctx.restore();
      }
    }
  }

  function drawPieces() {
    for (const p of pieces) {
      ctx.save();
      ctx.globalAlpha = Math.max(0, p.life);
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation);
      ctx.drawImage(p.img, -p.size / 2, -p.size / 2);
      ctx.restore();
    }
  }

  function drawDigitParticles() {
    ctx.save();
    for (const d of digitParticles) {
      ctx.globalAlpha = Math.max(0, d.life);
      ctx.fillStyle = "rgb(120,255,170)";
      ctx.shadowColor = "rgba(120,255,170,0.8)";
      ctx.shadowBlur = 6;
      ctx.font = `${d.size}px monospace`;
      ctx.textAlign = "center";
      ctx.fillText(d.text, d.x, d.y);
    }
    ctx.restore();
  }

  function drawExplosionParticles() {
    ctx.save();
    for (const e of explosionParticles) {
      ctx.globalAlpha = Math.max(0, e.life);
      ctx.fillStyle = `rgb(${e.color})`;
      ctx.beginPath();
      ctx.arc(e.x, e.y, e.radius, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  }

  // ============================================================
  //  Physics update (uses real elapsed time, not frame count, so
  //  speed stays consistent regardless of frame rate).
  // ============================================================
  function updatePhysics(dt, w, h) {
    // Freeze Banana: whole fruit/bombs move in slow motion. Your
    // finger's real-world speed is untouched (it's read straight from
    // wall-clock timestamps in processHands), so this is what makes
    // Freeze feel like "everything except you slowed down."
    const freezeScale = performance.now() < freezeUntil ? 0.3 : 1;
    const fdt = dt * freezeScale;

    for (const o of fallingObjects) {
      o.vy += GRAVITY * fdt;
      o.x += o.vx * fdt; o.y += o.vy * fdt;
      o.rotation += o.vrot * fdt;
    }
    fallingObjects = fallingObjects.filter(o => o.y < h + 120);

    for (const p of pieces) {
      p.vy += GRAVITY * dt;
      p.x += p.vx * dt; p.y += p.vy * dt;
      p.rotation += p.vrot * dt;
      p.life -= dt * 0.6;
    }
    pieces = pieces.filter(p => p.life > 0 && p.y < h + 150);

    for (const d of digitParticles) {
      d.vy += GRAVITY * 0.25 * dt;
      d.x += d.vx * dt; d.y += d.vy * dt;
      d.life -= dt * 1.1;
    }
    digitParticles = digitParticles.filter(d => d.life > 0);

    for (const e of explosionParticles) {
      e.vy += GRAVITY * 0.4 * dt;
      e.x += e.vx * dt; e.y += e.vy * dt;
      e.life -= dt * 1.3;
    }
    explosionParticles = explosionParticles.filter(e => e.life > 0);

    for (const s of slashFlashes) {
      s.life -= dt * 5; // quick, punchy flash — gone in ~0.2s
    }
    slashFlashes = slashFlashes.filter(s => s.life > 0);
  }

  // ============================================================
  //  MAIN LOOP
  // ============================================================
  function renderLoop() {
    requestAnimationFrame(renderLoop);
    if (video.readyState < 2) return;

    const w = canvas.width, h = canvas.height;
    const now = performance.now();
    const dt = Math.min(0.05, (now - lastFrameTime) / 1000); // clamp to avoid huge jumps on tab-switch
    lastFrameTime = now;

    // Live camera background
    ctx.drawImage(video, 0, 0, w, h);

    // Hand detection (only on genuinely new video frames)
    let results = null;
    if (handLandmarker && video.currentTime !== lastVideoTime) {
      lastVideoTime = video.currentTime;
      results = handLandmarker.detectForVideo(video, now);
    }
    if (!gameOver && !paused) processHands(results, w, h);

    if (!gameOver && !paused) {
      if (now > nextSpawnAt) {
        spawnWave();
        const inFrenzy = now < frenzyUntil;
        nextSpawnAt = now + (inFrenzy ? 150 + Math.random() * 200 : 950 + Math.random() * 900);
      }
      updatePhysics(dt, w, h);

      // Combo chain expired — hide the readout and reset the counter.
      if (comboCount > 0 && now - lastSliceTime > COMBO_WINDOW_MS) {
        comboCount = 0;
        comboEl.classList.remove("show");
      }

      // Fade the screen tint out once every power-up has run its course.
      if (now > frenzyUntil && now > freezeUntil && now > doubleUntil) {
        tintEl.style.opacity = "0";
      }
    }

    drawFallingObjects();
    drawPieces();
    drawDigitParticles();
    drawExplosionParticles();
    drawSlashFlashes();
    drawBladeTrails();
  }

  // ============================================================
  //  BOOTSTRAP
  // ============================================================
  async function main() {
    warmUpEmojiGlyphs();
    renderLives();
    statusEl.textContent = "Requesting camera access…";
    await startCamera();

    statusEl.textContent = "Loading hand tracking model…";
    await setupHandLandmarker();

    statusEl.textContent = "Swipe your index finger through the fruit — avoid the bombs!";
    showOverlay("Ready!", "Frame yourself in the camera, then press Start.", "▶ Start");
    renderLoop(); // runs immediately so the live camera preview shows behind the Start overlay
  }

  main().catch(err => {
    console.error(err);
    statusEl.textContent = "Error: " + err.message + " (check camera permissions)";
  });
</script>
</body>
</html>
